# Data configuration — single source of truth for the whole pipeline.
# Week 1: verify benchmark download works with these settings.
# Changing market later (e.g. FR stretch goal in week 7) = change here only.

benchmark:
  # epftoolbox dataset name: 'DE', 'FR', 'BE', 'NP', 'PJM'
  dataset: "DE"
  # Held-out test period (years). Lago et al. protocol uses 2.
  years_test: 2
  # Where raw CSVs are cached after auto-download
  raw_path: "data/raw"

live:
  # Energy-Charts API (Fraunhofer ISE) — keyless, CC BY 4.0
  base_url: "https://api.energy-charts.info"
  # Bidding zone: 'DE-LU' (Germany today), 'FR', 'BE', ...
  bzn: "DE-LU"
  # Recent data arrives at 15-min resolution; pipeline schema is hourly
  resample_to_hourly: true
  # Required attribution (thesis, app UI, README)
  attribution: "Data: Energy-Charts (Fraunhofer ISE) / Bundesnetzagentur SMARD.de, CC BY 4.0"

processed_path: "data/processed"

# Reproducibility
random_seed: 42
