# MLflow Tracking Configuration
tracking:
  uri: "http://localhost:5000"

experiments:
  benchmarks:   { name: "01_benchmarks",     description: "ARIMA, SARIMA, naive baselines" }
  classical_ml: { name: "02_classical_ml",   description: "RF, XGBoost, LightGBM, SVR" }
  deep_learning:{ name: "03_deep_learning",  description: "LSTM, GRU" }
  hybrid:       { name: "04_hybrid_ensemble",description: "Hybrid and stacking ensembles" }
  ablation:     { name: "05_ablation",       description: "H4 domain feature ablation" }

defaults:
  random_seed: 42
  test_size: 0.15
  val_size: 0.15
  alpha: 0.05
